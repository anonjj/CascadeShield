server:
  port: 8080

spring:
  application:
    name: gateway-service

downstream:
  order-service-url: ${ORDER_SERVICE_URL:http://localhost:8081}
  # Direct container names for fanout/mesh — bypass toxiproxy for non-CB calls
  inventory-service-url: ${INVENTORY_SERVICE_URL:http://inventory-service:8082}
  payment-service-url: ${PAYMENT_SERVICE_URL:http://payment-service:8083}

resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        # false = CB state visible in health but does not flip overall service status to DOWN
        allow-health-indicator-to-fail: false
        sliding-window-type: ${CB_SLIDING_WINDOW_TYPE:COUNT_BASED}
        sliding-window-size: ${CB_SLIDING_WINDOW_SIZE:10}
        failure-rate-threshold: ${CB_FAILURE_RATE_THRESHOLD:50}
        wait-duration-in-open-state: ${CB_WAIT_DURATION_OPEN:15s}
        permitted-number-of-calls-in-half-open-state: ${CB_PERMITTED_CALLS_HALF_OPEN:5}
        automatic-transition-from-open-to-half-open-enabled: true
        # Slow-call tracking: calls > 2s count as slow (latency fault injects 3s)
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: ${CB_FAILURE_RATE_THRESHOLD:50}
    instances:
      orderServiceCB:
        base-config: default

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,circuitbreakers,circuitbreakerevents,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
